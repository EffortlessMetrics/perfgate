schema_version = "1.0"

[[claim]]
id = "PERFGATE-CLAIM-0001"
statement = "Perfgate maintains a Rails artifact graph for durable proposals, specs, lanes, support claims, policy references, and closeouts."
proof = ["cargo +1.95.0 run -p xtask -- rails check"]
references = [
  ".rails/specs/PERFGATE-SPEC-0001-rails-artifact-graph.md",
  "docs/rails.md",
  "docs/contributing/rails.md",
]

[[claim]]
id = "PERFGATE-CLAIM-0002"
statement = "Perfgate product claims are governed by docs/status/PRODUCT_CLAIMS.md; the Rails support map records Rails-owned support claims and cross-links instead of duplicating every product claim."
proof = [
  "cargo +1.95.0 run -p xtask -- product-claims-check",
  "cargo +1.95.0 run -p xtask -- docs-source-check",
]
references = [
  "docs/status/PRODUCT_CLAIMS.md",
  "docs/status/SUPPORT_TIERS.md",
  "docs/status/PROOF_FRESHNESS.md",
  "docs/contributing/rails.md",
]
