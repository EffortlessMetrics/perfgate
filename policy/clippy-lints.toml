# ---------------------------------------------------------------------------
# Disallowed methods/macros (process/clock/IO discipline)
# ---------------------------------------------------------------------------
# These are mirrored into clippy.toml when the corresponding clippy lints
# (`disallowed_methods`, `disallowed_macros`) are activated. They are inert
# until then, but documented here so policy lives in one place.

[[disallowed_method]]
path = "std::process::exit"
reason = "Only the CLI boundary may decide process exit; library code must propagate Result."

[[disallowed_method]]
path = "std::thread::sleep"
reason = "Use injected clocks or retry-policy helpers — sleeps cause flaky tests."
