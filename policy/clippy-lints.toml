# Shared Clippy/Rust lint policy for the perfgate workspace.
#
# This file is the *authoritative* declaration of the lint policy. The
# `[workspace.lints.*]` block in the root `Cargo.toml` MUST be a strict subset
# of (or equal to) the lints listed below. `cargo run -p xtask -- check-lint-policy`
# enforces the relationship.
#
# Design principles (see docs/CLIPPY_POLICY.md):
#   * Deny by default. Allow by receipt. Expire exceptions. Measure drift.
#   * Clippy is the immediate code-shape detector.
#   * The semantic no-panic checker (policy/no-panic-allowlist.toml) is the
#     authoritative exception mechanism for panic-family debt.
#   * No bare `#[allow(...)]`. Use `#[expect(..., reason = "...")]` only.
#   * No `clippy.toml` test carveouts (`allow-unwrap-in-tests`, etc.).

schema_version = "1.0"
msrv = "1.93"

[policy]
# Tests must not panic outside of the test harness's own assertion macros.
panic_free_tests = true
# Disable test-only Clippy carveouts entirely.
allow_test_carveouts = false
# All exception attributes must use `#[expect(..., reason = "...")]`.
suppression_style = "expect-with-reason"
# Forbid `#![warn(clippy::all, clippy::pedantic, ...)]` blanket profiles.
blanket_categories = false
# Unsafe posture for this repo. perfgate has unix `wait4()` and friends, so
# unsafe is `deny` rather than `forbid`. Specific blocks must be receipted.
unsafe_posture = "deny"

# ---------------------------------------------------------------------------
# Active lints (as of MSRV 1.93)
# ---------------------------------------------------------------------------
#
# Format:
#   [[active]]
#   name  = "<lint name without `clippy::`/`rust::` prefix>"
#   group = "rust" | "clippy"
#   level = "deny" | "warn" | "allow"
#   reason = "<one line describing what bug/footgun this catches>"
#
# Stage notes:
#   * Lints currently shipped as `warn` are debt-staged: the workspace owns
#     existing debt, and the lint will be promoted to `deny` once the no-panic
#     allowlist baseline catches up.
#   * Lints currently shipped as `deny` are intentionally non-negotiable.

