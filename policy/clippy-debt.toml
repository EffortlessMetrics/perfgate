# Clippy debt ledger.
#
# Every Clippy lint that is currently shipped at a *softer* level than the
# target level in `policy/clippy-lints.toml` must be receipted here, with an
# owner, a reason, and an expiry. `cargo run -p xtask -- check-lint-policy`
# fails on:
#   * entries with a missing/expired `expires`
#   * entries whose `target_level` is already met (stale debt)
#   * lints in clippy-lints.toml that are softer than target without an entry
#
# Schema:
#   [[debt]]
#   lint = "clippy::unwrap_used"
#   current_level = "allow"
#   target_level = "deny"
#   owner = "<team or maintainer handle>"
#   reason = "<one line, ideally with a tracking issue>"
#   expires = "YYYY-MM-DD"

