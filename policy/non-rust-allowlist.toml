# ---------------------------------------------------------------------------
# Fixtures, contracts, schemas, baselines
# ---------------------------------------------------------------------------

[[allow]]
glob = "fixtures/**/*.json"
kind = "fixture_input"
owner = "perfgate-core"
surface = "fixtures"
classification = "test"
reason = "Schema and conformance fixtures."
covered_by = ["cargo run -p xtask -- conform", "cargo run -p xtask -- schema-compat"]

[[allow]]
glob = "crates/*/tests/fixtures/**"
kind = "fixture_input"
owner = "perfgate-core"
surface = "fixtures"
classification = "test"
reason = "Per-crate test fixture inputs (JSON receipts, golden CSVs)."
covered_by = ["cargo test --workspace --all-features"]

[[allow]]
glob = "crates/*/src/snapshots/*.snap"
kind = "snapshot"
owner = "perfgate-core"
surface = "fixtures"
classification = "test"
reason = "insta snapshot files; refreshed via `cargo insta accept`."
covered_by = ["cargo test --workspace --all-features"]

[[allow]]
glob = "crates/*/tests/snapshots/*.snap"
kind = "snapshot"
owner = "perfgate-core"
surface = "fixtures"
classification = "test"
reason = "insta snapshot files for per-crate integration tests."
covered_by = ["cargo test --workspace --all-features"]

[[allow]]
glob = "crates/*/proptest-regressions/*.txt"
kind = "regression_corpus"
owner = "perfgate-core"
surface = "fixtures"
classification = "test"
reason = "proptest seed corpus auto-saved on shrunk failures."
covered_by = ["cargo test --workspace --all-features"]

[[allow]]
glob = "contracts/**"
