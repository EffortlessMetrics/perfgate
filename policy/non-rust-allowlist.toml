[[allow]]
glob = "schemas/**"
kind = "schema"
owner = "perfgate-core"
surface = "schema"
classification = "generated"
reason = "schemars-generated JSON Schemas, byte-locked against the source types."
generated_by = "cargo run -p xtask -- schema"
covered_by = ["cargo run -p xtask -- schema-check"]

[[allow]]
glob = "baselines/**"
kind = "baseline"
owner = "perfgate-core"
