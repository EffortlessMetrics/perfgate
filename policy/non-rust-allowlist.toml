# Non-Rust file policy for the perfgate workspace.
#
# Default implementation path is Rust + xtask. Non-Rust source/config surfaces
# require an explicit, owned, reason-receipted entry below. The file-policy
# checker (`cargo run -p xtask -- check-file-policy`) classifies every
# git-tracked file and fails on:
#   * unknown non-Rust files without an entry
#   * entries whose `expires` has passed
#   * entries whose glob matches no files (stale receipts, unless retired = true)
#
# Surfaces vocabulary:
#   ci          — CI/CD pipeline declarative configs (GitHub Actions, GitLab)
#   editor      — Editor extensions (VS Code, JetBrains)
#   fixtures    — Test fixtures and golden files
#   contracts   — Vendored schemas / wire format declarations
#   docs        — Markdown, prose, ADRs
#   config      — Repo-level static config (deny.toml, mutants.toml, ...)
#   scripts     — Shell scripts and tooling helpers
#   schema      — Hand-written JSON Schema or contract files
#   badge       — Generated metadata (badges, dashboards)
#   release     — Release/packaging declaratives
#   licenses    — License manifests
#
# Classifications:
#   production  — runs in shipped binaries or affects on-the-wire schema
#   test        — exercised only by `cargo test`
#   tooling     — development-time only (xtask, editor extensions)
#   config      — declarative, not executed
#   generated   — produced by xtask; should be checked in but not edited by hand

schema_version = "1.0"

# ---------------------------------------------------------------------------
# CI / release / declarative platform configs
# ---------------------------------------------------------------------------

[[allow]]
glob = ".github/workflows/*.yml"
kind = "ci_declarative"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "GitHub Actions workflow definitions are platform-required YAML."
covered_by = ["cargo run -p xtask -- ci"]

[[allow]]
glob = ".github/**/*.yml"
kind = "ci_declarative"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "GitHub repo-level config (Dependabot, issue templates, etc.)."
covered_by = []

