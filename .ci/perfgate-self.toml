[defaults]
repeat = 7
warmup = 1
threshold = 0.15
warn_factor = 0.90
baseline_pattern = "baselines/gha-linux-x86_64/{bench}.json"

[[bench]]
name = "cli/compare-small"
command = ["./target/release/perfgate-selfbench", "cli-compare-small"]
budgets = { wall_ms = { threshold = 0.12, warn_factor = 0.90, statistic = "median" } }

[[bench]]
name = "cli/compare-large"
command = ["./target/release/perfgate-selfbench", "cli-compare-large"]
budgets = { wall_ms = { threshold = 0.15, warn_factor = 0.90, statistic = "median" } }

[[bench]]
name = "cli/check-single"
command = ["./target/release/perfgate-selfbench", "cli-check-single"]
budgets = { wall_ms = { threshold = 0.20, warn_factor = 0.90, statistic = "p95" } }

[[bench]]
name = "cli/check-no-baseline"
command = ["./target/release/perfgate-selfbench", "cli-check-no-baseline"]
budgets = { wall_ms = { threshold = 0.20, warn_factor = 0.90, statistic = "p95" } }

[[bench]]
name = "render/md"
command = ["./target/release/perfgate-selfbench", "render-md"]

[[bench]]
name = "render/report"
command = ["./target/release/perfgate-selfbench", "render-report"]