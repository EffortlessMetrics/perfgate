# perfgate GitLab CI Template
#
# This template provides a standard job for running perfgate performance checks
# in GitLab CI/CD pipelines.
#
# Usage:
#   include:
#     - remote: 'https://raw.githubusercontent.com/EffortlessMetrics/perfgate/v0.18.0/gitlab-ci/perfgate.yml'
#
#   perfgate-check:
#     extends: .perfgate-check
#     variables:
#       PERFGATE_CONFIG: "perfgate.toml"

.perfgate-check:
  image: rust:1.95.0
  stage: test
  variables:
    PERFGATE_CONFIG: "perfgate.toml"
    PERFGATE_ARTIFACTS_DIR: "artifacts/perfgate"
    PERFGATE_VERSION: "0.18.0"
  before_script:
    - |
      if ! command -v perfgate &> /dev/null; then
        echo "Installing perfgate..."
        cargo install perfgate-cli --locked --version "${PERFGATE_VERSION}"
      fi
  script:
    - mkdir -p ${PERFGATE_ARTIFACTS_DIR}
    - perfgate check --config ${PERFGATE_CONFIG} --all --out-dir ${PERFGATE_ARTIFACTS_DIR}
  artifacts:
    when: always
    paths:
      - ${PERFGATE_ARTIFACTS_DIR}/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
