# perfgate.multi.toml - Runnable multi-benchmark configuration example

[defaults]
repeat = 5
warmup = 1
threshold = 0.15
baseline_dir = "baselines"

[[bench]]
name = "cargo-metadata"
command = ["cargo", "metadata", "--format-version", "1", "--no-deps"]

[[bench]]
name = "cargo-version"
command = ["cargo", "--version"]
# Override global threshold for this specific benchmark
[bench.budgets.wall_ms]
threshold = 0.10

[[bench]]
name = "rustc-version"
command = ["rustc", "--version"]
# This gates command runtime. Use ingest/adoption-pack flows for static metrics
# such as bundle size instead of timing a file-stat command.
[bench.budgets.wall_ms]
threshold = 0.05
