# perfgate.toml - Minimal runnable configuration example

[defaults]
# Number of measured samples per benchmark
repeat = 5
# Number of warmup samples (not counted in stats)
warmup = 1
# Global regression threshold (0.20 = 20%)
threshold = 0.20
# Warning factor (warn threshold = threshold * warn_factor)
warn_factor = 0.90
# Directory where baseline receipts are stored
baseline_dir = "baselines"

[[bench]]
name = "cargo-metadata"
# Command to execute (argv format). Replace this with your project's benchmark
# before promoting a production baseline.
command = ["cargo", "metadata", "--format-version", "1", "--no-deps"]
# Optional: expected units of work (enables throughput metrics)
# work = 1000
